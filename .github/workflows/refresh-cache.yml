name: Refresh dashboard cache

on:
  schedule:
    # 매일 10:00 KST (= 01:00 UTC), 17:00 KST (= 08:00 UTC)
    - cron: '0 1,8 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/refresh
        run: |
          curl -fsS --max-time 180 --retry 2 \
            -X POST \
            -H "X-Refresh-Token: ${{ secrets.REFRESH_TOKEN }}" \
            https://jhawk-flight-schedule.onrender.com/api/refresh
